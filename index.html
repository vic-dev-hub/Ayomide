<!DOCTYPE html>
<html>
<head>
    <title>Ayomide Space Glow</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            background: radial-gradient(circle at top, #0f2027, #000000 70%);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            flex-direction:column;
        }

        .container{
            text-align:center;
            position:relative;
            z-index:2;
        }

        .name{
            font-size:255px;
            font-family:'Dancing Script', cursive;
            letter-spacing:5px;
            cursor:pointer;

            background: linear-gradient(45deg, #00f5ff, #9d00ff, #ff00c8);
            background-size:400%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            animation: gradientMove 6s linear infinite,
                       glowPulse 2s ease-in-out infinite;

            transition:0.4s;

            /* 🌌 Space Reflection */
            -webkit-box-reflect: below 8px 
            linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .name:hover{
            transform:scale(1.15);
        }

        @keyframes gradientMove{
            0%{background-position:0%;}
            100%{background-position:400%;}
        }

        @keyframes glowPulse{
            0%,100%{text-shadow:0 0 15px #00f5ff;}
            50%{text-shadow:0 0 40px #9d00ff;}
        }

        /* Stars */
        .star{
            position:absolute;
            width:4.5px;
            height:4.5px;
            background:white;
            border-radius:50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle{
            from{opacity:0.2;}
            to{opacity:1;}
        }

        /* Floating cosmic particles */
        .particle{
            position:absolute;
            bottom:-10px;
            width:10px;
            height:10px;
            background:#00f5ff;
            border-radius:50%;
            opacity:0.7;
            animation: float linear infinite;
        }

        @keyframes float{
            from{
                transform:translateY(0);
                opacity:1;
            }
            to{
                transform:translateY(-110vh);
                opacity:0;
            }
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="name">Ayomide</div>
    </div>

    <script>
        // 🌟 Generate stars
        for(let i=0;i<120;i++){
            const star=document.createElement("div");
            star.classList.add("star");
            star.style.top=Math.random()*100+"vh";
            star.style.left=Math.random()*100+"vw";
            star.style.animationDuration=(Math.random()*3+1)+"s";
            document.body.appendChild(star);
        }

        // 🌌 Floating particles
        for(let i=0;i<40;i++){
            const dot=document.createElement("span");
            dot.classList.add("particle");
            document.body.appendChild(dot);

            dot.style.left=Math.random()*100+"vw";
            dot.style.animationDuration=(Math.random()*6+4)+"s";
        }
    </script>

</body>
</html>
